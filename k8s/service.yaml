apiVersion: v1
kind: Service
metadata:
  name: url-shortener-svc
spec:
  type: LoadBalancer
  selector:
    app: url-shortener
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: url-shortener-internal
spec:
  type: ClusterIP
  selector:
    app: url-shortener
  ports:
    - name: http
      port: 8000
      targetPort: 8000
